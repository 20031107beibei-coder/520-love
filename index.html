<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>520</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+SC:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-snap-type:y mandatory}
body{background:#08080c;color:#e8e0d8;font-family:'Noto Serif SC','Cormorant Garamond',serif;overflow-x:hidden;cursor:default}
::selection{background:rgba(200,160,130,0.3);color:#fff}
::-webkit-scrollbar{width:0}

/* ===== Section base ===== */
section{min-height:100vh;scroll-snap-align:start;position:relative;overflow:hidden}

/* ===== Opening ===== */
.opening{display:flex;align-items:center;justify-content:center;flex-direction:column;background:#08080c}
.opening::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(180,140,110,0.06),transparent 70%);animation:pulse 8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.3);opacity:1}}

.opening-line{width:1px;height:0;background:linear-gradient(to bottom,transparent,rgba(200,170,140,0.6),transparent);animation:lineGrow 2s ease-out forwards;position:absolute;top:15%}
@keyframes lineGrow{to{height:20vh}}

.opening-num{font-family:'Playfair Display',serif;font-size:clamp(8rem,22vw,16rem);font-weight:700;background:linear-gradient(135deg,#c9a87c,#e8d5b7,#c9a87c,#8b7355);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 6s ease-in-out infinite;letter-spacing:-0.02em;line-height:1;opacity:0;animation:fadeIn 2s ease-out 0.5s forwards,shimmer 6s ease-in-out 2.5s infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes fadeIn{to{opacity:1}}

.opening-sub{font-size:clamp(0.9rem,2vw,1.3rem);letter-spacing:1.2em;color:rgba(200,170,140,0.5);margin-top:30px;font-weight:300;opacity:0;animation:fadeIn 2s ease-out 1.5s forwards}
.opening-date{font-family:'Playfair Display',serif;font-size:clamp(0.75rem,1.2vw,0.9rem);color:rgba(200,170,140,0.3);margin-top:40px;letter-spacing:0.5em;opacity:0;animation:fadeIn 2s ease-out 2s forwards}

.scroll-cue{position:absolute;bottom:50px;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeIn 2s ease-out 3s forwards}
.scroll-cue span{font-size:0.65rem;letter-spacing:0.3em;color:rgba(200,170,140,0.3);text-transform:uppercase}
.scroll-bar{width:1px;height:40px;background:linear-gradient(to bottom,rgba(200,170,140,0.4),transparent);animation:scrollPulse 2s ease-in-out infinite}
@keyframes scrollPulse{0%,100%{opacity:0.3;transform:scaleY(0.6)}50%{opacity:1;transform:scaleY(1)}}

/* ===== Horizontal Photo Scroll ===== */
.photo-scroll{display:flex;align-items:center;background:#0a0a0e}
.photo-scroll .section-label{position:absolute;left:40px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:0.7rem;letter-spacing:0.4em;color:rgba(200,170,140,0.25);white-space:nowrap;z-index:2}
.scroll-track{display:flex;gap:30px;padding:0 10vw;overflow-x:auto;scroll-snap-type:x mandatory;width:100%;height:100%;align-items:center;-ms-overflow-style:none;scrollbar-width:none}
.scroll-track::-webkit-scrollbar{display:none}
.scroll-card{flex:0 0 auto;width:clamp(260px,30vw,380px);scroll-snap-align:center;position:relative;cursor:pointer}
.scroll-card-img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:2px;filter:brightness(0.85) contrast(1.05);transition:all 0.8s cubic-bezier(0.25,0,0,1)}
.scroll-card:hover .scroll-card-img{filter:brightness(1) contrast(1);transform:scale(1.02)}
.scroll-card::after{content:'';position:absolute;inset:0;border:1px solid rgba(200,170,140,0.08);border-radius:2px;transition:border-color 0.5s}
.scroll-card:hover::after{border-color:rgba(200,170,140,0.2)}
.scroll-card-num{position:absolute;top:20px;right:20px;font-family:'Playfair Display',serif;font-size:0.7rem;color:rgba(255,255,255,0.2);letter-spacing:0.1em}

/* ===== Vertical Story ===== */
.story{padding:0;background:#08080c}
.story-pair{display:flex;height:100vh;scroll-snap-align:start}
.story-pair:nth-child(even){flex-direction:row-reverse}
.story-img-wrap{flex:1;overflow:hidden;position:relative}
.story-img-wrap img{width:100%;height:100%;object-fit:cover;filter:brightness(0.7) saturate(0.9);transition:all 1.2s cubic-bezier(0.25,0,0,1)}
.story-pair:hover .story-img-wrap img{filter:brightness(0.85) saturate(1);transform:scale(1.05)}
.story-text-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px;position:relative}
.story-text{max-width:360px}
.story-text .num{font-family:'Playfair Display',serif;font-size:4rem;color:rgba(200,170,140,0.08);font-weight:700;line-height:1;margin-bottom:20px}
.story-text p{font-size:clamp(1rem,1.8vw,1.3rem);line-height:2.2;color:rgba(232,224,216,0.7);font-weight:300}
.story-text .accent{color:#c9a87c;font-weight:400}
.story-divider{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:40px;height:1px;background:rgba(200,170,140,0.15)}

/* ===== Fullscreen Carousel ===== */
.carousel-section{display:flex;align-items:center;justify-content:center;background:#08080c;flex-direction:column}
.carousel-container{position:relative;width:80vw;max-width:900px;overflow:hidden}
.carousel-slide{display:flex;transition:transform 1s cubic-bezier(0.25,0,0,1)}
.carousel-slide img{width:100%;flex-shrink:0;aspect-ratio:16/10;object-fit:cover;filter:contrast(1.05)}
.carousel-bar{display:flex;gap:4px;margin-top:30px;justify-content:center}
.carousel-bar div{width:40px;height:2px;background:rgba(200,170,140,0.15);border-radius:1px;cursor:pointer;transition:all 0.5s}
.carousel-bar div.active{background:rgba(200,170,140,0.6);width:60px}
.carousel-caption{text-align:center;margin-top:20px;font-size:0.85rem;color:rgba(200,170,140,0.4);letter-spacing:0.2em;min-height:1.5em;transition:opacity 0.5s}

/* ===== Letter ===== */
.letter{display:flex;align-items:center;justify-content:center;flex-direction:column;background:#08080c}
.letter-inner{max-width:550px;text-align:center;padding:40px}
.letter-icon{width:30px;height:30px;border:1px solid rgba(200,170,140,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 50px;animation:letterPulse 3s ease-in-out infinite}
@keyframes letterPulse{0%,100%{border-color:rgba(200,170,140,0.15);transform:scale(1)}50%{border-color:rgba(200,170,140,0.35);transform:scale(1.05)}}
.letter-icon::after{content:'';width:6px;height:6px;border-radius:50%;background:rgba(200,170,140,0.4)}
.letter p{font-size:clamp(1rem,1.8vw,1.2rem);line-height:2.4;color:rgba(232,224,216,0.6);font-weight:300;margin-bottom:1em;letter-spacing:0.05em}
.letter .hl{color:#c9a87c;font-weight:400}
.letter .sign{margin-top:40px;font-size:0.8rem;color:rgba(200,170,140,0.3);letter-spacing:0.3em}

/* ===== Ending ===== */
.ending{display:flex;align-items:center;justify-content:center;flex-direction:column;background:#08080c}
.ending-num{font-family:'Playfair Display',serif;font-size:clamp(6rem,18vw,14rem);font-weight:700;color:rgba(200,170,140,0.04);line-height:1;user-select:none}
.ending p{font-size:0.75rem;letter-spacing:1em;color:rgba(200,170,140,0.2);margin-top:30px}

/* ===== Grain overlay ===== */
.grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ===== Reveal animation ===== */
.reveal{opacity:0;transform:translateY(30px);transition:all 1.2s cubic-bezier(0.25,0,0,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:0.2s}
.reveal-delay-2{transition-delay:0.4s}

/* ===== Responsive ===== */
@media(max-width:768px){
  .story-pair{flex-direction:column!important;height:auto}
  .story-img-wrap{height:50vh}
  .story-text-wrap{padding:40px 30px}
  .scroll-card{width:70vw}
  .carousel-container{width:92vw}
  .opening-sub{letter-spacing:0.5em}
}
</style>
</head>
<body>

<div class="grain"></div>

<!-- Opening -->
<section class="opening">
  <div class="opening-line"></div>
  <div class="opening-num">520</div>
  <div class="opening-sub">遇见你是最美的意外</div>
  <div class="opening-date">2 0 2 6 &nbsp; . &nbsp; 0 5 &nbsp; . &nbsp; 2 0</div>
  <div class="scroll-cue">
    <span>Scroll</span>
    <div class="scroll-bar"></div>
  </div>
</section>

<!-- Horizontal Photo Scroll -->
<section class="photo-scroll" id="photoScroll">
  <div class="section-label">OUR MOMENTS</div>
  <div class="scroll-track" id="scrollTrack"></div>
</section>

<!-- Story Pairs -->
<section class="story" id="storySection"></section>

<!-- Fullscreen Carousel -->
<section class="carousel-section">
  <div class="carousel-container">
    <div class="carousel-slide" id="carouselSlide"></div>
  </div>
  <div class="carousel-bar" id="carouselBar"></div>
  <div class="carousel-caption" id="carouselCaption"></div>
</section>

<!-- Letter -->
<section class="letter">
  <div class="letter-inner reveal">
    <div class="letter-icon"></div>
    <p>从遇见你的<span class="hl">那一刻</span>起<br>我的世界便有了<span class="hl">色彩</span></p>
    <p>每一个和你在一起的瞬间<br>都是我生命中<span class="hl">最珍贵的宝藏</span></p>
    <p>谢谢你出现在我的生命里<br>让平凡的日子也变得<span class="hl">闪闪发光</span></p>
    <p>往后的每一天<br>都想<span class="hl">牵着你的手</span>一起走过</p>
    <div class="sign">— forever yours</div>
  </div>
</section>

<!-- Ending -->
<section class="ending">
  <div class="ending-num reveal">520</div>
  <p class="reveal reveal-delay-1">I &nbsp; L O V E &nbsp; Y O U</p>
</section>

<script>
const photos = [
  { src: '微信图片_20260520140109_234_46.jpg', caption: '阳光下的你' },
  { src: '微信图片_20260520140110_235_46.jpg', caption: '温柔的侧脸' },
  { src: '微信图片_20260520140112_236_46.jpg', caption: '最好的我们' },
  { src: '微信图片_20260520140114_237_46.jpg', caption: '一起走过的路' },
  { src: '微信图片_20260520140217_238_46.jpg', caption: '你的笑容' },
  { src: '微信图片_20260520140443_239_46.jpg', caption: '心动瞬间' },
  { src: '微信图片_20260520140444_240_46.jpg', caption: '平凡的幸福' },
  { src: '微信图片_20260520141641_241_46.jpg', caption: '眼里的光' },
  { src: '微信图片_20260520141655_242_46.jpg', caption: '夏日微风' },
  { src: '微信图片_20260520141707_243_46.jpg', caption: '默契' },
  { src: '微信图片_20260520141720_244_46.jpg', caption: '你和我的故事' },
  { src: '微信图片_20260520141729_245_46.jpg', caption: '小小世界' },
  { src: '微信图片_20260520141752_246_46.jpg', caption: '一起变老' },
  { src: '微信图片_20260520141758_247_46.jpg', caption: '安静的时光' },
  { src: '微信图片_20260520141810_248_46.jpg', caption: '余生请多指教' },
  { src: '微信图片_20260520141916_249_46.jpg', caption: '最好的安排' },
  { src: '微信图片_20260520141957_250_46.jpg', caption: '永远在一起' },
];

// Horizontal scroll track
const track = document.getElementById('scrollTrack');
photos.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'scroll-card';
  card.innerHTML = `<img class="scroll-card-img" src="${p.src}" alt="${p.caption}" loading="lazy"><div class="scroll-card-num">${String(i+1).padStart(2,'0')}</div>`;
  track.appendChild(card);
});

// Story pairs (use 4 photos)
const storySection = document.getElementById('storySection');
const storyData = [
  { img: photos[0].src, text: '遇见你的那天<br><span class="accent">阳光刚好</span><br>风也刚好' },
  { img: photos[4].src, text: '你的笑容<br>是我见过<span class="accent">最美的风景</span>' },
  { img: photos[6].src, text: '和你在一起<br><span class="accent">平凡的日子</span><br>也会发光' },
  { img: photos[10].src, text: '往后余生<br><span class="accent">风雪是你</span><br>平淡是你' },
];
storyData.forEach((s, i) => {
  const pair = document.createElement('div');
  pair.className = 'story-pair reveal';
  pair.innerHTML = `
    <div class="story-img-wrap"><img src="${s.img}" loading="lazy"></div>
    <div class="story-text-wrap">
      <div class="story-text">
        <div class="num">${String(i+1).padStart(2,'0')}</div>
        <p>${s.text}</p>
      </div>
    </div>
    <div class="story-divider"></div>
  `;
  storySection.appendChild(pair);
});

// Carousel
const slide = document.getElementById('carouselSlide');
const bar = document.getElementById('carouselBar');
const caption = document.getElementById('carouselCaption');
const carouselPhotos = [photos[2], photos[3], photos[5], photos[7], photos[9], photos[12], photos[15]];
carouselPhotos.forEach(p => {
  slide.innerHTML += `<img src="${p.src}" alt="${p.caption}">`;
  const dot = document.createElement('div');
  dot.onclick = () => goSlide(carouselPhotos.indexOf(p));
  bar.appendChild(dot);
});
let cur = 0;
function goSlide(n) {
  cur = n;
  slide.style.transform = `translateX(-${cur * 100}%)`;
  bar.querySelectorAll('div').forEach((d,i) => d.classList.toggle('active', i===cur));
  caption.style.opacity = '0';
  setTimeout(() => { caption.textContent = carouselPhotos[cur].caption; caption.style.opacity = '1'; }, 300);
}
goSlide(0);
setInterval(() => goSlide((cur+1) % carouselPhotos.length), 4000);

// Scroll reveal
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

// Subtle mouse parallax on opening
const num = document.querySelector('.opening-num');
document.addEventListener('mousemove', e => {
  if (!num) return;
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;
  num.style.transform = `translate(${x}px, ${y}px)`;
});
</script>
</body>
</html>
