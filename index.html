<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>520 - 我爱你</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    overflow-x: hidden;
    font-family: 'ZCOOL XiaoWei', serif;
    color: #fff;
  }

  /* ===== 飘落花瓣 ===== */
  .petal {
    position: fixed;
    top: -40px;
    pointer-events: none;
    z-index: 9999;
    animation: fall linear forwards;
    font-size: 20px;
    opacity: 0.8;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.9; }
    25%  { transform: translateY(25vh) rotate(90deg) translateX(30px); }
    50%  { transform: translateY(50vh) rotate(180deg) translateX(-20px); }
    75%  { transform: translateY(75vh) rotate(270deg) translateX(40px); }
    100% { transform: translateY(105vh) rotate(360deg) translateX(0); opacity: 0; }
  }

  /* ===== 首页大标题 ===== */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(180,40,80,0.25) 0%, transparent 70%);
  }
  .hero-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(5rem, 15vw, 12rem);
    background: linear-gradient(135deg, #ff6b9d, #ff2d75, #ff6b9d, #fff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite, heartbeat 1.5s ease-in-out infinite;
    text-shadow: 0 0 60px rgba(255,45,117,0.5);
    position: relative;
    z-index: 1;
  }
  @keyframes shimmer {
    0%,100% { background-position: 0% 50%; }
    50%     { background-position: 100% 50%; }
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    15%     { transform: scale(1.1); }
    30%     { transform: scale(1); }
    45%     { transform: scale(1.08); }
  }
  .hero-sub {
    font-size: clamp(1rem, 3vw, 1.8rem);
    margin-top: 20px;
    color: rgba(255,200,210,0.85);
    letter-spacing: 8px;
    animation: fadeUp 2s ease-out 0.5s both;
    z-index: 1;
  }
  .hero-date {
    margin-top: 30px;
    font-size: clamp(1.2rem, 2.5vw, 2rem);
    color: rgba(255,150,180,0.9);
    font-family: 'Ma Shan Zheng', cursive;
    animation: fadeUp 2s ease-out 1s both;
    z-index: 1;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .scroll-hint {
    position: absolute;
    bottom: 40px;
    animation: bounce 2s ease-in-out infinite;
    z-index: 1;
    font-size: 1.5rem;
    color: rgba(255,200,210,0.6);
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(15px); }
  }

  /* ===== 心跳粒子背景 ===== */
  .heart-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .heart-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,80,130,0.4);
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0); }
    10%  { opacity: 1; transform: translateY(-10vh) scale(1); }
    90%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-110vh) scale(0.5); }
  }

  /* ===== 相册轮播 ===== */
  .gallery-section {
    min-height: 100vh;
    padding: 80px 20px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .section-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: #ff6b9d;
    margin-bottom: 50px;
    animation: fadeUp 1s ease-out both;
  }
  .carousel-wrapper {
    position: relative;
    max-width: 800px;
    margin: 0 auto;
    perspective: 1200px;
  }
  .carousel {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 80px rgba(255,45,117,0.3), 0 0 120px rgba(255,45,117,0.1);
    border: 3px solid rgba(255,107,157,0.3);
  }
  .carousel img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease, transform 1s ease;
    transform: scale(1.05);
  }
  .carousel img.active {
    opacity: 1;
    transform: scale(1);
  }
  .carousel-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,10,26,0.5) 0%, transparent 40%);
    pointer-events: none;
    z-index: 2;
  }
  .carousel-caption {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: #fff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    background: rgba(255,107,157,0.3);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .carousel-btn:hover {
    background: rgba(255,107,157,0.6);
    transform: translateY(-50%) scale(1.1);
  }
  .prev-btn { left: -25px; }
  .next-btn { right: -25px; }
  .carousel-dots {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 30px;
  }
  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,107,157,0.3);
    cursor: pointer;
    transition: all 0.3s;
    border: 1px solid rgba(255,107,157,0.5);
  }
  .dot.active {
    background: #ff6b9d;
    transform: scale(1.3);
    box-shadow: 0 0 15px rgba(255,107,157,0.6);
  }

  /* ===== 照片墙 ===== */
  .mosaic-section {
    padding: 80px 20px;
    position: relative;
    z-index: 1;
  }
  .mosaic-grid {
    max-width: 1000px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }
  .mosaic-item {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 3/4;
    cursor: pointer;
    transition: transform 0.5s ease, box-shadow 0.5s ease;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .mosaic-item:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 60px rgba(255,45,117,0.3);
  }
  .mosaic-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }
  .mosaic-item:hover img {
    transform: scale(1.1);
  }
  .mosaic-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(255,45,117,0.4), transparent 60%);
    opacity: 0;
    transition: opacity 0.5s;
  }
  .mosaic-item:hover::after { opacity: 1; }

  /* ===== 表白文字 ===== */
  .love-letter {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    position: relative;
    z-index: 1;
  }
  .letter-card {
    max-width: 650px;
    background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(255,45,117,0.06));
    border: 1px solid rgba(255,107,157,0.2);
    border-radius: 24px;
    padding: 50px 40px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 80px rgba(255,45,117,0.15);
    text-align: center;
    animation: fadeUp 1.5s ease-out both;
  }
  .letter-heart {
    font-size: 4rem;
    animation: heartbeat 1.5s ease-in-out infinite;
    display: inline-block;
  }
  .letter-text {
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    line-height: 2.2;
    color: rgba(255,220,230,0.9);
    margin-top: 30px;
  }
  .letter-text .highlight {
    color: #ff6b9d;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.4em;
  }
  .letter-sign {
    margin-top: 40px;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.6rem;
    color: #ff6b9d;
  }

  /* ===== 底部大心 ===== */
  .footer-section {
    height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .big-heart {
    font-size: clamp(6rem, 20vw, 12rem);
    animation: heartbeat 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 40px rgba(255,45,117,0.5));
    cursor: default;
    user-select: none;
    transition: filter 0.3s;
  }
  .big-heart:hover {
    filter: drop-shadow(0 0 80px rgba(255,45,117,0.8));
  }
  .footer-text {
    position: absolute;
    bottom: 30%;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    color: rgba(255,150,180,0.7);
    letter-spacing: 6px;
  }

  /* ===== 点击爱心特效 ===== */
  .click-heart {
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    font-size: 1.5rem;
    animation: clickHeartAnim 1s ease-out forwards;
  }
  @keyframes clickHeartAnim {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }

  /* ===== 全屏光效 ===== */
  .glow-orb {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,45,117,0.08), transparent 70%);
    pointer-events: none;
    z-index: 0;
    transition: all 0.3s ease;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 600px) {
    .prev-btn { left: 5px; }
    .next-btn { right: 5px; }
    .carousel-btn { width: 40px; height: 40px; font-size: 1.2rem; }
    .letter-card { padding: 30px 20px; }
  }
</style>
</head>
<body>

<!-- 光球跟随鼠标 -->
<div class="glow-orb" id="glowOrb"></div>

<!-- 浮动爱心背景粒子 -->
<div class="heart-bg" id="heartBg"></div>

<!-- ===== 首页 ===== -->
<section class="hero">
  <div class="hero-title">520</div>
  <div class="hero-sub">遇 见 你 是 我 最 美 的 意 外</div>
  <div class="hero-date">2026.05.20</div>
  <div class="scroll-hint">↓</div>
</section>

<!-- ===== 相册轮播 ===== -->
<section class="gallery-section">
  <div class="section-title">我们的故事</div>
  <div class="carousel-wrapper">
    <div class="carousel" id="carousel">
      <div class="carousel-overlay"></div>
      <div class="carousel-caption" id="caption"></div>
    </div>
    <button class="carousel-btn prev-btn" onclick="changeSlide(-1)">‹</button>
    <button class="carousel-btn next-btn" onclick="changeSlide(1)">›</button>
    <div class="carousel-dots" id="dots"></div>
  </div>
</section>

<!-- ===== 照片墙 ===== -->
<section class="mosaic-section">
  <div class="section-title">时光印记</div>
  <div class="mosaic-grid" id="mosaicGrid"></div>
</section>

<!-- ===== 表白信 ===== -->
<section class="love-letter">
  <div class="letter-card">
    <div class="letter-heart">❤️</div>
    <div class="letter-text">
      从遇见你的<span class="highlight">那一刻</span>起<br>
      我的世界便有了<span class="highlight">色彩</span><br><br>
      每一个和你在一起的瞬间<br>
      都是我生命中<span class="highlight">最珍贵的宝藏</span><br><br>
      谢谢你出现在我的生命里<br>
      让平凡的日子也变得<span class="highlight">闪闪发光</span><br><br>
      往后的每一天<br>
      我都想<span class="highlight">牵着你的手</span>一起走过
    </div>
    <div class="letter-sign">—— 永远爱你的人 ❤</div>
  </div>
</section>

<!-- ===== 底部大心 ===== -->
<section class="footer-section">
  <div class="big-heart">❤️</div>
  <div class="footer-text">我爱你 · 520</div>
</section>

<script>
// ===== 图片数据 =====
const photos = [
  { src: '微信图片_20260520140109_234_46.jpg', caption: '阳光下的你，笑得真好看 ☀️' },
  { src: '微信图片_20260520140110_235_46.jpg', caption: '和你在一起，哪里都是风景 🌸' },
  { src: '微信图片_20260520140112_236_46.jpg', caption: '最浪漫的事，就是和你一起变老 💕' },
  { src: '微信图片_20260520140114_237_46.jpg', caption: '你的每一个瞬间，我都想珍藏 📸' },
  { src: '微信图片_20260520140217_238_46.jpg', caption: '世界那么大，幸好我遇到了你 🌍' },
  { src: '微信图片_20260520140443_239_46.jpg', caption: '你是我心中最美的风景 🌹' },
  { src: '微信图片_20260520140444_240_46.jpg', caption: '520，我爱你 💗' },
  { src: '微信图片_20260520141641_241_46.jpg', caption: '每一个眼神都让人心动 ✨' },
  { src: '微信图片_20260520141655_242_46.jpg', caption: '你的笑容是我的阳光 🌞' },
  { src: '微信图片_20260520141707_243_46.jpg', caption: '和你在一起的每一天都是礼物 🎁' },
  { src: '微信图片_20260520141720_244_46.jpg', caption: '你是我最美的遇见 🦋' },
  { src: '微信图片_20260520141729_245_46.jpg', caption: '牵着你的手，走遍千山万水 🏔️' },
  { src: '微信图片_20260520141752_246_46.jpg', caption: '你是我生命中最美的意外 💫' },
  { src: '微信图片_20260520141758_247_46.jpg', caption: '时光不老，我们不散 🕰️' },
  { src: '微信图片_20260520141810_248_46.jpg', caption: '你的眼里有星辰大海 🌌' },
  { src: '微信图片_20260520141916_249_46.jpg', caption: '余生请多指教 💍' },
  { src: '微信图片_20260520141957_250_46.jpg', caption: '执子之手，与子偕老 💞' }
];

// ===== 初始化轮播 =====
const carousel = document.getElementById('carousel');
const caption = document.getElementById('caption');
const dotsContainer = document.getElementById('dots');
let currentSlide = 0;

photos.forEach((photo, i) => {
  const img = document.createElement('img');
  img.src = photo.src;
  img.alt = photo.caption;
  if (i === 0) img.classList.add('active');
  carousel.appendChild(img);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goToSlide(i);
  dotsContainer.appendChild(dot);
});
caption.textContent = photos[0].caption;

function goToSlide(n) {
  const imgs = carousel.querySelectorAll('img');
  const dots = dotsContainer.querySelectorAll('.dot');
  imgs[currentSlide].classList.remove('active');
  dots[currentSlide].classList.remove('active');
  currentSlide = (n + photos.length) % photos.length;
  imgs[currentSlide].classList.add('active');
  dots[currentSlide].classList.add('active');
  caption.textContent = photos[currentSlide].caption;
}
function changeSlide(dir) { goToSlide(currentSlide + dir); }
setInterval(() => changeSlide(1), 4000);

// ===== 初始化照片墙 =====
const grid = document.getElementById('mosaicGrid');
photos.forEach((photo, i) => {
  const item = document.createElement('div');
  item.className = 'mosaic-item';
  item.innerHTML = `<img src="${photo.src}" alt="${photo.caption}" loading="lazy">`;
  item.style.animationDelay = `${i * 0.1}s`;
  grid.appendChild(item);
});

// ===== 飘落花瓣 =====
const petalEmojis = ['🌸', '💗', '💖', '🌹', '❤️', '💕', '🩷', '✨'];
function createPetal() {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.animationDuration = (4 + Math.random() * 5) + 's';
  petal.style.fontSize = (14 + Math.random() * 18) + 'px';
  document.body.appendChild(petal);
  setTimeout(() => petal.remove(), 9000);
}
setInterval(createPetal, 400);

// ===== 背景浮动粒子 =====
const heartBg = document.getElementById('heartBg');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'heart-particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.top = (50 + Math.random() * 60) + '%';
  p.style.animationDuration = (6 + Math.random() * 10) + 's';
  p.style.animationDelay = Math.random() * 8 + 's';
  p.style.width = p.style.height = (3 + Math.random() * 6) + 'px';
  heartBg.appendChild(p);
}

// ===== 鼠标跟随光球 =====
const glowOrb = document.getElementById('glowOrb');
document.addEventListener('mousemove', e => {
  glowOrb.style.left = (e.clientX - 200) + 'px';
  glowOrb.style.top = (e.clientY - 200) + 'px';
});

// ===== 点击出爱心 =====
document.addEventListener('click', e => {
  const heart = document.createElement('div');
  heart.className = 'click-heart';
  heart.textContent = ['❤️', '💗', '💖', '💕', '🩷'][Math.floor(Math.random() * 5)];
  heart.style.left = e.clientX + 'px';
  heart.style.top = e.clientY + 'px';
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 1000);
});

// ===== 滚动渐入动画 =====
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.style.opacity = '1';
      entry.target.style.transform = 'translateY(0)';
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.section-title, .mosaic-item').forEach(el => {
  el.style.opacity = '0';
  el.style.transform = 'translateY(40px)';
  el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
  observer.observe(el);
});
</script>
</body>
</html>
